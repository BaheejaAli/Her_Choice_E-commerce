{% extends "user_section/profile_base.html" %}
{% block extra_css %}
<style>
  .cancel-container {
    max-width: 720px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    padding: 24px;
  }

  @media (max-width: 480px) {
    .cancel-container {
      padding: 16px;
    }

    .cancel-container .btn {
      width: 100%;
      margin-bottom: 10px;
    }
  }
</style>
{% endblock extra_css %}
{% block profile_content %}

<div class="cancel-container">
    <h2>Cancel Order</h2>
    <p>Order #{{ order.orderid }}</p>

    <form method="post">
        {% csrf_token %}

        <label>Reason for cancellation</label>
        <textarea name="cancel_reason"
                  required
                  placeholder="Please tell us why you are cancelling"
                  style="width:100%; padding:10px; margin-bottom:15px;"></textarea>

        <button type="submit" class="btn btn-danger">
            Confirm Cancel
        </button>

        <a href="{% url 'order_details' order.id %}"
           class="btn btn-secondary">
            Go Back
        </a>
    </form>
</div>

{% endblock %}
