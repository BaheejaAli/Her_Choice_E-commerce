<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Bad Request | Her Choice</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #57606f;
            --bg: #f1f2f6;
            --text: #2f3542;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
        }

        .container {
            text-align: center;
            padding: 3rem;
            max-width: 500px;
        }

        .error-code {
            font-size: 10rem;
            font-weight: 600;
            color: rgba(0,0,0,0.05);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            color: #747d8c;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="error-code">400</div>
    <div class="container">
        <h1>Bad Request</h1>
        <p>Something went wrong with your request. Your browser sent a request that this server could not understand.</p>
        <a href="/" class="btn">Go Back</a>
    </div>
</body>
</html>
