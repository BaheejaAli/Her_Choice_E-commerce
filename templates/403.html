<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied | Her Choice</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --bg: #000000;
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; scale: 0.9; }
            to { opacity: 1; scale: 1; }
        }

        .error-code {
            font-size: 8rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 0;
            letter-spacing: -4px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #ff4757;
        }

        p {
            font-size: 1rem;
            margin-bottom: 2rem;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 14px 40px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .lock-icon {
            margin-bottom: 1rem;
            color: #ff4757;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg class="lock-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <div class="error-code">403</div>
        <h1>Access Denied</h1>
        <p>You don't have permission to view this resource. If you think this is a mistake, please log in with appropriate credentials.</p>
        <a href="/" class="btn">Back Home</a>
    </div>
</body>
</html>
