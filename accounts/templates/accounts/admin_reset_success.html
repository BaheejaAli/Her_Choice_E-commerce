{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Her Choice | Password Reset Successful</title>

    <!-- Google Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #fdf3f7, #f0f5ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            width: 500px;
            background: #ffffff;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
        }

        .brand-title {
            text-align: center;
            color: #d6336c;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .brand-subtitle {
            text-align: center;
            font-size: 14px;
            color: #555;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 32px;
        }

        .btn-custom {
            background: linear-gradient(135deg, #d6336c, #b91c4a);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background: linear-gradient(135deg, #b91c4a, #9c1638);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(214, 51, 108, 0.3);
        }
    </style>
</head>
<body>

<div class="auth-card">

<!-- Green Tick Icon -->
<div class="text-center mb-4">
    <div class="success-icon">
        <i class="fa-solid fa-check"></i>
    </div>
</div>

<!-- Title -->
<h4 class="fw-bold text-center mb-2">Password Reset Successful!</h4>

<!-- Description -->
<p class="text-muted text-center mb-4" style="font-size:15px;">
    Your password has been successfully reset.<br>
    You can now log in with your new password.
</p>

<!-- Button -->
<div class="d-grid">
    <a href="{% url 'admin_login' %}" class="btn btn-custom w-100">
        Back to Login
    </a>
</div>

<link rel="stylesheet" href="{% static 'css/accounts/admin_reset_success.css' %}">

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
