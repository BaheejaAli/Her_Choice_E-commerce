{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Her Choice | Verify OTP</title>

    <!-- Google Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: linear-gradient(135deg, #fdf3f7, #f0f5ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            width: 500px;
            background: #ffffff;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.08);
        }

        .brand-title {
            text-align: center;
            color: #d6336c;
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .brand-subtitle {
            text-align: center;
            font-size: 14px;
            color: #555;
        }

        .btn-custom {
            background: linear-gradient(135deg, #d6336c, #b91c4a);
            border: none;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-custom:hover {
            background: linear-gradient(135deg, #b91c4a, #9c1638);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(214, 51, 108, 0.3);
        }

        .form-control:focus {
            border-color: #d6336c;
            box-shadow: 0 0 0 0.2rem rgba(214, 51, 108, 0.25);
        }
    </style>
</head>
<body>

<div class="auth-card">

<h3 class="fw-bold mb-2">Verify OTP</h3>

<p class="text-muted mb-4">
    We've sent a 6-digit code to <strong>{{ request.session.reset_email }}</strong>
</p>

<form method="POST" id="otpForm">
    {% csrf_token %}

    <label class="fw-medium">Enter Verification Code</label>

    <!-- OTP Input Boxes -->
    <div class="d-flex gap-2 my-3 justify-content-center">
        <input type="text" maxlength="1" class="otp-input" />
        <input type="text" maxlength="1" class="otp-input" />
        <input type="text" maxlength="1" class="otp-input" />
        <input type="text" maxlength="1" class="otp-input" />
        <input type="text" maxlength="1" class="otp-input" />
        <input type="text" maxlength="1" class="otp-input" />
    </div>

    <!-- Invisible field to send full OTP -->
    <input type="hidden" name="otp" id="otpHidden">

    <!-- Verify Button -->
    <button type="submit" class="btn btn-custom w-100 mt-2">
        Verify Code
    </button>

    {% if error %}
    <p class="text-danger text-center mt-3">{{ error }}</p>
    {% endif %}

</form>

<!-- Back Link -->
<div class="text-center mt-3">
    <a href="{% url 'admin_forgot_password' %}" class="text-muted">Back</a>
</div>

<link rel="stylesheet" href="{% static 'css/accounts/admin_otp_verify.css' %}">

<script src="{% static 'js/accounts/admin_otp_verify.js' %}"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
