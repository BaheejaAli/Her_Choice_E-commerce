{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Her Choice | {% block title %}{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Poppins", sans-serif;
            background: #fdeef3; /* soft pink background */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            width: 550px;
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.1);
        }

        .brand-title {
            color: #d6336c;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
        }

        .brand-subtitle {
            text-align: center;
            font-size: 16px;
            font-weight: 500;
        }

        .brand-description {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-bottom: 20px;
        }

        .form-control {
            height: 48px;
            border-radius: 10px;
            font-size: 15px;
        }

        .btn-custom {
            background: #d6336c;
            color: white;
            height: 48px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
        } 

        .custom-input {
            height: 48px;
            font-size: 15px;
            border-radius: 10px !important;
        }

        .eye-btn {
            cursor: pointer;
            background: white;
            border-left: none;
            border-radius: 0 10px 10px 0;
        }
        .btn-custom:hover {
            background: #b82859;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_script %}{% endblock %}

</body>

</html>
