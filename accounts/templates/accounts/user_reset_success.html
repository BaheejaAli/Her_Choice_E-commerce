{% extends "accounts/user_base.html" %}
{% load static %}
{% block title %}Password Reset Successful{% endblock %}

{% block content %}

<!-- Green Tick Icon -->
<div class="text-center mb-4">
    <div class="success-icon">
        <i class="fa-solid fa-check"></i>
    </div>
</div>

<!-- Title -->
<h4 class="fw-bold text-center mb-2">Password Reset Successful!</h4>

<!-- Description -->
<p class="text-muted text-center mb-4" style="font-size:15px;">
    Your password has been successfully reset.<br>
    You can now log in with your new password.
</p>

<!-- Button -->
<div class="d-grid">
    <a href="{% url 'user_login' %}" class="btn btn-custom w-100">
        Back to Login
    </a>
</div>

<link rel="stylesheet" href="{% static 'css/accounts/user_reset_success.css' %}">

{% endblock %}
