{% extends 'user_section/profile_base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/user_section/profile_edit.css' %}">
<link rel="stylesheet" href="{% static 'css/user_section/profile_base.css' %}">
    {% endblock %}
{% block profile_content %}
<div class="main-container">
    <main class="content-area">
        <h1 class="page-title">Edit Personal Information</h1>
        <form method="POST">
            {% csrf_token %}
            <section class="section">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        {{ form.first_name }}
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        {{ form.last_name }}
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        {{ form.email }}
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        {{ form.phone }}
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label>Gender</label>
                        {{ form.gender }}
                    </div>
                </div>
                <div style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">
                    <button type="submit" class="edit-button">Save Changes</button>
                    <a href="{% url 'profile_info' %}" class="edit-button" style="background: #888; text-decoration: none;">Cancel</a>
                </div>
            </section>
        </form>
    </main>
</div>
{% endblock %}
